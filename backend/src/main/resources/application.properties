spring.application.name=smart-resume-analyzer

# Server Port
server.port=${PORT:8080}

# MongoDB Configuration
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/resumeDB}

# OpenAI API Key
openai.api.key=${OPENAI_API_KEY:YOUR_OPENAI_API_KEY_HERE}
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# CORS (Allow frontend URL or localhost for dev)
cors.allowed.origins=${FRONTEND_URL:http://localhost:5173}
